name: UI Tests

on:
  repository_dispatch:
    types: [dbeaver-prerelease]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'DBeaver pre-release tag (e.g. v17.0.0-pre.2). Leave empty to auto-detect latest.'
        required: false
        type: string

permissions:
  contents: read
  checks: write

env:
  FIREBIRD_VERSION: '5.0.3'
  FIREBIRD_BUILD: '1683-0'

jobs:
  ui-tests:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve DBeaver release tag
        id: resolve-tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG="${{ github.event.client_payload.tag }}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG=$(gh api repos/fdcastel/dbeaver/releases --jq '[.[] | select(.prerelease)] | first | .tag_name')
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved DBeaver release tag: ${TAG}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download DBeaver P2 repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          echo "Downloading P2 repository from release ${TAG}..."
          gh release download "${TAG}" \
            --repo fdcastel/dbeaver \
            --pattern '*-p2-repository.tar.gz' \
            --dir .
          mkdir -p /c/dbeaver-p2-repo
          tar -xzf *-p2-repository.tar.gz -C /c/dbeaver-p2-repo
          echo "P2 repository extracted to C:\\dbeaver-p2-repo"
          ls /c/dbeaver-p2-repo/

      - name: Install Firebird ${{ env.FIREBIRD_VERSION }}
        shell: pwsh
        run: |
          $installerName = "Firebird-${{ env.FIREBIRD_VERSION }}.${{ env.FIREBIRD_BUILD }}-windows-x64.exe"
          $url = "https://github.com/FirebirdSQL/firebird/releases/download/v${{ env.FIREBIRD_VERSION }}/${installerName}"
          Write-Host "Downloading ${url}..."
          Invoke-WebRequest -Uri $url -OutFile $installerName -UseBasicParsing

          Write-Host "Installing Firebird..."
          Start-Process -FilePath ".\${installerName}" -ArgumentList '/VERYSILENT', '/SP-', '/NORESTART', '/SUPPRESSMSGBOXES' -Wait -NoNewWindow

          # Wait for the service to start
          $svc = $null
          for ($i = 0; $i -lt 30; $i++) {
            $svc = Get-Service -Name 'FirebirdServerDefaultInstance' -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -eq 'Running') { break }
            Start-Sleep -Seconds 2
          }
          if (-not $svc -or $svc.Status -ne 'Running') {
            Write-Error "Firebird service did not start within 60 seconds"
            exit 1
          }
          Write-Host "Firebird ${{ env.FIREBIRD_VERSION }} installed and running."

          # Verify isql is available
          $isql = "C:\Program Files\Firebird\Firebird_5_0\isql.exe"
          if (-not (Test-Path $isql)) {
            Write-Error "isql.exe not found at: $isql"
            exit 1
          }
          Write-Host "isql.exe found at: $isql"

      - name: Create test database
        shell: pwsh
        run: |
          $isql = "C:\Program Files\Firebird\Firebird_5_0\isql.exe"
          $dbDir = "C:\temp\firebird-ui-test"
          $dbPath = "$dbDir\UI_TEST_FB5.FDB"

          New-Item -ItemType Directory -Path $dbDir -Force | Out-Null

          # Create database
          $createSql = "CREATE DATABASE '$dbPath' USER 'SYSDBA' PASSWORD 'masterkey' DEFAULT CHARACTER SET UTF8;"
          $createSql | & $isql -user SYSDBA -password masterkey -z 2>&1
          if (-not (Test-Path $dbPath)) {
            Write-Host "Trying alternative creation via localhost..."
            $createSql = "CREATE DATABASE 'localhost/3050:$dbPath' USER 'SYSDBA' PASSWORD 'masterkey' DEFAULT CHARACTER SET UTF8;"
            $createSql | & $isql -user SYSDBA -password masterkey 2>&1
          }
          if (-not (Test-Path $dbPath)) {
            Write-Error "Failed to create test database at: $dbPath"
            exit 1
          }
          Write-Host "Database created: $dbPath"

          # Apply fixtures
          $fixtureDir = "${{ github.workspace }}\fixtures\sql"
          Get-ChildItem $fixtureDir -Filter "*.sql" | Sort-Object Name | ForEach-Object {
            Write-Host "Applying fixture: $($_.Name)"
            & $isql -user SYSDBA -password masterkey "localhost/3050:$dbPath" -input $_.FullName 2>&1
          }
          Write-Host "Database setup complete."

      - name: Start pre-installed PostgreSQL
        shell: pwsh
        run: |
          $svc = Get-Service | Where-Object { $_.Name -like 'postgresql-x64-*' } | Select-Object -First 1
          if (-not $svc) { throw 'No postgresql-x64-* service found on runner' }
          Write-Host "Found service: $($svc.Name) (status: $($svc.Status))"

          Set-Service -Name $svc.Name -StartupType Automatic
          if ($svc.Status -ne 'Running') {
            Start-Service -Name $svc.Name
          }

          $pgBin = (Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\psql.exe' | Select-Object -First 1).DirectoryName
          if (-not $pgBin) { throw 'psql.exe not found under C:\Program Files\PostgreSQL' }
          Write-Host "PostgreSQL bin: $pgBin"
          "$pgBin" | Out-File -FilePath $env:GITHUB_PATH -Append

          # The windows-latest PostgreSQL default superuser password is 'root'.
          # Reset it to 'postgres' to match the test configuration.
          $env:PGPASSWORD = 'root'
          & "$pgBin\psql.exe" -U postgres -h 127.0.0.1 -c "ALTER USER postgres WITH PASSWORD 'postgres';"
          if ($LASTEXITCODE -ne 0) { throw "Failed to reset postgres password (exit=$LASTEXITCODE)" }

          $env:PGPASSWORD = 'postgres'
          & "$pgBin\psql.exe" -U postgres -h 127.0.0.1 -c "DROP DATABASE IF EXISTS ui_test;"
          & "$pgBin\psql.exe" -U postgres -h 127.0.0.1 -c "CREATE DATABASE ui_test;"
          if ($LASTEXITCODE -ne 0) { throw "Failed to create ui_test database (exit=$LASTEXITCODE)" }
          Write-Host "PostgreSQL is running, database 'ui_test' created."

      - name: Run UI tests
        timeout-minutes: 20
        shell: bash
        run: |
          P2_URL="file:///C:/dbeaver-p2-repo"
          DB_PATH="C:/temp/firebird-ui-test/UI_TEST_FB5.FDB"

          mvn clean verify \
            -f pom.xml \
            "-Ddbeaver.p2.url=${P2_URL}" \
            -Dfirebird.host=localhost \
            -Dfirebird.port=3050 \
            "-Dfirebird.database=${DB_PATH}" \
            -Dfirebird.user=SYSDBA \
            -Dfirebird.password=masterkey \
            -Dpostgres.host=localhost \
            -Dpostgres.port=5432 \
            -Dpostgres.database=ui_test \
            -Dpostgres.user=postgres \
            -Dpostgres.password=postgres \
            -B --no-transfer-progress

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.resolve-tag.outputs.tag }}
          path: |
            plugins/*/target/surefire-reports/TEST-*.xml
            artifacts/**
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'plugins/*/target/surefire-reports/TEST-*.xml'
          check_name: 'DBeaver UI Test Results'
          include_passed: true
